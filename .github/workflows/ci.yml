name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --max-warnings 0

      - name: Unit tests with coverage
        run: |
          npx jest --coverage --coverageReporters text-summary
          COVERAGE=$(cat coverage/coverage-summary.json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('total',{}).get('lines',{}).get('pct',0))" 2>/dev/null || echo "0")
          echo "### Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          echo "COVERAGE_PCT=${COVERAGE}" >> $GITHUB_ENV

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
