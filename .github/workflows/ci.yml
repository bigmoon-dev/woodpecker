name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --max-warnings 0

      - name: Unit tests with coverage
        run: |
          npx jest --coverage --coverageReporters json-summary text-summary
          COVERAGE=$(python3 -c "import json; d=json.load(open('coverage/coverage-summary.json')); print(d['total']['lines']['pct'])")
          echo "### Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          echo "COVERAGE_PCT=${COVERAGE}" >> $GITHUB_ENV

      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          PCT=${COVERAGE_PCT%.*}
          if [ "$PCT" -ge 90 ]; then COLOR=brightgreen; elif [ "$PCT" -ge 70 ]; then COLOR=yellowgreen; elif [ "$PCT" -ge 50 ]; then COLOR=yellow; else COLOR=red; fi
          BADGE_URL="https://img.shields.io/badge/coverage-${COVERAGE_PCT}%25-${COLOR}"
          sed -i "s|coverage-[0-9.]*%25-[a-z]*|coverage-${COVERAGE_PCT}%25-${COLOR}|g" README.md README.en.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md README.en.md || (git add README.md README.en.md && git commit -m "ci: update coverage badge to ${COVERAGE_PCT}%")

      - name: Push badge update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
